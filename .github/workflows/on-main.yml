name: Main Branch Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: memorylane
          POSTGRES_PASSWORD: memorylane
          POSTGRES_DB: memorylane
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e "services/api-gateway[dev]"

      - name: Lint
        run: ruff check .

      - name: Run all tests
        env:
          MEMORYLANE_ENVIRONMENT: test
          MEMORYLANE_DATABASE_URL: postgresql+asyncpg://memorylane:memorylane@localhost:5432/memorylane
          MEMORYLANE_REDIS_URL: redis://localhost:6379/0
        run: pytest services/ -v --tb=short

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test]
    # TODO: uncomment when ECR is provisioned
    if: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push api-gateway
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/memorylane-api-gateway:$IMAGE_TAG services/api-gateway
          docker push $ECR_REGISTRY/memorylane-api-gateway:$IMAGE_TAG
